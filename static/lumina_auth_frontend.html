<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Lumina-Auth: Zero-Knowledge Face Login</title>
	<link href="https://fonts.googleapis.com/css?family=Montserrat:400,700|Roboto:400,700&display=swap" rel="stylesheet">
	<style>
		body {
			font-family: 'Montserrat', 'Roboto', sans-serif;
			background: linear-gradient(135deg, #0f2027 0%, #2c5364 100%);
			color: #fff;
			margin: 0;
			min-height: 100vh;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			overflow: hidden;
		}
		.background-glass {
			position: absolute;
			top: 0; left: 0; width: 100vw; height: 100vh;
			z-index: 0;
			pointer-events: none;
		}
		.container {
			position: relative;
			z-index: 1;
			background: rgba(255,255,255,0.12);
			border-radius: 24px;
			box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
			backdrop-filter: blur(16px);
			-webkit-backdrop-filter: blur(16px);
			border: 1px solid rgba(255,255,255,0.18);
			padding: 40px 32px;
			width: 380px;
			text-align: center;
			animation: fadeIn 1s;
		}
		/* ...existing styles... */
	</style>
</head>
<body>
	<div class="background-glass"></div>
	<div class="container">
		<h1>Lumina-Auth</h1>
		<p>Zero-Knowledge Face Login</p>
		<div id="auth-forms">
			<form id="register-form">
				<h2>Register</h2>
				<input type="text" id="register-username" placeholder="Username" required><br>
				<input type="password" id="register-password" placeholder="Password" required><br>
				<button type="submit">Register</button>
				<div id="register-message"></div>
			</form>
			<hr style="margin: 24px 0;">
			<form id="login-form">
				<h2>Login</h2>
				<input type="text" id="login-username" placeholder="Username" required><br>
				<input type="password" id="login-password" placeholder="Password" required><br>
				<button type="submit">Login</button>
				<div id="login-message"></div>
			</form>
			<button id="logout-btn" style="display:none;margin-top:20px;">Logout</button>
			<div id="logout-message"></div>
		</div>
		<script>
// Clear register message on input
document.getElementById('register-username').addEventListener('input', function() {
    document.getElementById('register-message').textContent = '';
});
document.getElementById('register-password').addEventListener('input', function() {
    document.getElementById('register-message').textContent = '';
});

// Clear login message on input
document.getElementById('login-username').addEventListener('input', function() {
    document.getElementById('login-message').textContent = '';
});
document.getElementById('login-password').addEventListener('input', function() {
    document.getElementById('login-message').textContent = '';
});
		// Registration
		document.getElementById('register-form').addEventListener('submit', function(e) {
			e.preventDefault();
			fetch('/register', {
				method: 'POST',
				headers: {'Content-Type': 'application/json'},
				body: JSON.stringify({
					username: document.getElementById('register-username').value,
					password: document.getElementById('register-password').value
				})
			})
			.then(res => res.json())
			.then(data => {
				document.getElementById('register-message').textContent = data.message;
			});
		});

		// Login
		document.getElementById('login-form').addEventListener('submit', function(e) {
			e.preventDefault();
			fetch('/login', {
				method: 'POST',
				headers: {'Content-Type': 'application/json'},
				body: JSON.stringify({
					username: document.getElementById('login-username').value,
					password: document.getElementById('login-password').value
				})
			})
			.then(res => res.json())
			.then(data => {
				document.getElementById('login-message').textContent = data.message;
				if (data.success) {
					document.getElementById('logout-btn').style.display = 'block';
                    document.getElementById('login-message').textContent += '\nConverted to digital signature';
				}
			});
		});

		// Logout
		document.getElementById('logout-btn').addEventListener('click', function() {
			fetch('/logout', {
				method: 'POST'
			})
			.then(res => res.json())
			.then(data => {
				document.getElementById('logout-message').textContent = data.message;
				document.getElementById('logout-btn').style.display = 'none';
			});
		});
		</script>
	</div>
</body>
</html>
